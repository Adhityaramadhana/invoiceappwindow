name: Build Windows EXE

# Builds a standalone Windows .exe with PyInstaller and uploads it.
# Runs on every push to main, and on manual trigger.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: >
          pyinstaller --noconfirm --onefile --windowed
          --name "InvoiceGenerator"
          --add-data "settings.json;."
          --add-data "assets;assets"
          main.py

      - name: Stage release files
        run: |
          mkdir release
          copy dist\InvoiceGenerator.exe release\
          copy settings.json release\
          mkdir release\assets
          mkdir release\output
          echo Put your logo here as logo.png > release\assets\README.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: InvoiceGenerator-Windows
          path: release/
